[behave]
# Paths
paths = features

# Output format - plain for console readability
stdout_capture = false
stderr_capture = false
log_capture    = false

# Default tags to run (comment out to run all)
# tags = smoke

# Show step timing
show_timings = true

# Show skipped scenarios
show_skipped = true

# Logging
logging_level  = INFO
logging_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
